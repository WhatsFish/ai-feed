# Nginx snippet for ai-feed. Drop into /etc/nginx/snippets/ai-feed.conf and
# `include snippets/ai-feed.conf;` from the personal-site server block,
# alongside the existing vpn-monitor and ai-playground includes.
#
# Same shape as vpn-monitor: location /feed (no trailing slash) +
# proxy_pass http://host (no trailing slash) so Next.js trailing-slash
# handling doesn't redirect-loop.

location /feed {
    proxy_pass http://127.0.0.1:3003;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Auth.js cookies pass through unchanged.
    proxy_set_header Cookie $http_cookie;
}
